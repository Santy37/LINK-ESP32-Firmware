; L.I.N.K. ESP32 Firmware — PlatformIO Configuration
;
; Board  : ESP32-S3 DevKitC  (change board if yours differs)
; Framework : Arduino  (ESP-IDF partition & BLE stack underneath)
;
; Build  : pio run
; Upload : pio run -t upload
; Monitor: pio device monitor -b 115200
;

[env:esp32s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Serial
monitor_speed = 115200
monitor_port  = COM3
upload_speed  = 921600
upload_port   = COM3

; USB CDC — route Serial to native USB port on ESP32-S3
board_upload.use_1200bps_touch   = true
board_upload.wait_for_upload_port = true

; N32R16V flash/PSRAM overrides
;    The default esp32-s3-devkitc-1 board is for the N8 (8MB Quad flash,
;    no PSRAM). Our N32R16V has 32MB Octal flash + 16MB Octal PSRAM.
;    The chip's eFuses are set for OPI flash, so the bootloader MUST
;    be compiled for OPI too — otherwise flash_ret assertion fails.
board_build.arduino.memory_type = opi_opi

; Partition table for BLE + OTA
board_build.partitions = default.csv

; Library dependencies
;    Only include libs for hardware you actually have connected.
;    Toggle HAS_* flags in include/config.h to match.
lib_deps =
  adafruit/Adafruit BNO055@^1.6.1          ; 9-DOF IMU        (HAS_IMU=1)
  adafruit/Adafruit Unified Sensor@^1.1.9  ;                  (HAS_IMU=1)
  adafruit/Adafruit BMP280 Library@^2.6.8  ; Barometer        (HAS_BARO=1)
  mikalhart/TinyGPSPlus@^1.0.3             ; GNSS parser      (HAS_GNSS=1)
  bblanchon/ArduinoJson@^7.1.0             ; JSON serialisation
  adafruit/Adafruit SSD1306@^2.5.7         ; OLED 128x32      (HAS_OLED=1)
  adafruit/Adafruit GFX Library@^1.11.9    ; GFX dependency

; Compiler flags
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DBOARD_HAS_PSRAM
